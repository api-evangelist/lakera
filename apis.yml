apis:
- aid: lakera:lakera-guard
  name: Lakera Guard
  tags:
  - AI Security
  - Prompt Injection
  - PII Detection
  - Content Moderation
  - LLM Guardrails
  humanURL: https://docs.lakera.ai/docs/api
  properties:
  - url: https://docs.lakera.ai/docs/api
    type: APIReference
  - url: https://docs.lakera.ai/docs/quickstart
    type: GettingStarted
  - url: https://platform.lakera.ai/docs/changelog
    type: ChangeLog
  description: Lakera Guard is a low-latency screening API that inspects text content sent to or from LLMs and flags threats
    including prompt injection, jailbreaks, PII, profanity, and policy violations. The /guard endpoint returns a flagged
    decision plus optional detector breakdowns via /guard/results, and the platform exposes /policies and /projects endpoints
    for managing detection logic. Available as a managed SaaS at api.lakera.ai/v2 with regional endpoints (US, EU, APAC)
    and as a self-hosted deployment for regulated environments.
- aid: lakera:lakera-red
  name: Lakera Red
  tags:
  - Red Teaming
  - AI Security
  - Vulnerability Assessment
  - GenAI Testing
  humanURL: https://www.lakera.ai/ai-red-teaming
  properties:
  - url: https://www.lakera.ai/ai-red-teaming
    type: Documentation
  description: Lakera Red is an automated red teaming product that probes GenAI applications for jailbreaks, prompt injection,
    data leakage, and other adversarial failures, then produces a risk-based remediation report. Designed for security teams
    evaluating AI applications prior to production deployment and for ongoing assurance of agentic systems.
- aid: lakera:gandalf
  name: Gandalf
  tags:
  - Education
  - Prompt Injection
  - Training
  - Research
  humanURL: https://gandalf.lakera.ai/
  properties:
  - url: https://gandalf.lakera.ai/
    type: Documentation
  description: Gandalf is Lakera's free interactive game that teaches prompt injection by challenging players to extract
    a secret from an LLM across progressively harder defenses. It has become a primary research and training environment
    for the prompt injection community and a public funnel into the Lakera Guard ecosystem.
